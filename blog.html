<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Editions — INSPIRE</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,700;1,300;1,500;1,700&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  
  <!-- Navigation (same as index.html) -->
  <nav id="mainNav"></nav>

  <!-- Blog Header -->
  <section class="blog-header">
    <div class="container">
      <h1 class="blog-title">All Editions</h1>
      <p class="blog-subtitle">Every interview and insight, in one place.</p>
      
      <!-- Filter Tabs -->
      <div class="filter-tabs">
        <button class="ftab active" data-filter="all">All</button>
        <button class="ftab" data-filter="interview">Interviews</button>
        <button class="ftab" data-filter="learned">Things I Learned</button>
      </div>
    </div>
  </section>

  <!-- All Posts Grid -->
  <section class="all-posts-section">
    <div class="container">
      <div class="stories-grid" id="allPosts">
        <div class="loading">Loading all editions...</div>
      </div>
      
      <!-- Load More Button -->
      <div class="load-more-wrap" style="display:none;">
        <button class="load-more-btn" id="loadMoreBtn">Load More</button>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer></footer>

  <!-- Scripts -->
  <script src="assets/js/main.js"></script>
  <script src="assets/js/beehiiv.js"></script>
  <script>
    // Initialize blog page
    window.addEventListener('DOMContentLoaded', () => {
      loadAllPosts();
      setupFilters();
    });
  </script>
</body>
</html>
