<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INSPIRE Sandbox</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,700;1,300;1,500;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1B2C45;
      --navy2: #243655;
      --beige: #F5F0E8;
      --beige2: #EAE3D5;
      --muted: #6B7280;
      --ink: #141210;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(234, 227, 213, 0.95), rgba(245, 240, 232, 0.98) 45%, rgba(27, 44, 69, 0.06) 100%),
        var(--beige);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      padding: 24px;
    }

    .sandbox-card {
      width: min(680px, 100%);
      border: 1px solid rgba(27, 44, 69, 0.12);
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 30px 70px rgba(27, 44, 69, 0.08);
      padding: 42px 36px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .sandbox-label {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(44px, 9vw, 82px);
      line-height: 0.95;
      color: var(--navy);
      margin-bottom: 16px;
    }

    p {
      max-width: 480px;
      margin: 0 auto 28px;
      font-size: 15px;
      line-height: 1.8;
      color: var(--muted);
    }

    .sandbox-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 260px;
      padding: 18px 28px;
      border: 1px solid var(--navy);
      background: var(--navy);
      color: var(--beige);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 11px;
      font-weight: 500;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .sandbox-button:hover {
      background: var(--navy2);
      transform: translateY(-2px);
    }

    .sandbox-note {
      margin-top: 18px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="sandbox-card">
    <div class="sandbox-label">Sandbox</div>
    <h1>Test Home</h1>
    <p>Use this isolated page to review homepage experiments visually before we carry anything over to the real English and Dutch homepages.</p>
    <a class="sandbox-button" href="test-home.html">Open Test Homepage</a>
    <div class="sandbox-note">This does not change the live homepage.</div>
  </main>
</body>
</html>
